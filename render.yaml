services:
  - type: web
    name: amiga-travel
    env: docker
    branch: main
    plan: free
    dockerfilePath: Dockerfile
    buildCommand: composer install --optimize-autoloader --no-dev && npm install --legacy-peer-deps && npm run build
    startCommand: ./scripts/railway-start.sh
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
      - key: APP_URL
        value: https://$SERVICE_URL
      - key: PORT
        value: '10000'
