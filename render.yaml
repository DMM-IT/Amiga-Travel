services:
  - type: web
    name: amiga-travel
    env: docker
    branch: main
    plan: free
    dockerfilePath: Dockerfile
    buildCommand: composer install --optimize-autoloader --no-dev && php artisan migrate --force
    startCommand: php artisan serve --host=0.0.0.0 --port=${PORT:-10000}
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
      - key: PORT
        value: '10000'
